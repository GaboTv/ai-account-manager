services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aimgr
      POSTGRES_PASSWORD: aimgr
      POSTGRES_DB: aimgr
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimgr"]
      interval: 2s
      timeout: 3s
      retries: 15

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://aimgr:aimgr@db:5432/aimgr
      DOCKER_HOST: unix:///var/run/docker.sock
      RUNNER_TZ: Europe/Madrid  # timezone shown in CLI usage/reset times (CEST)
      USAGE_POLL_MINUTES: 2     # how often the backend actually re-captures usage; 0 disables (each capture boots the TUI ~30s)
      # --- app login ---
      # Seeds the FIRST user if the users table is empty. After that, manage
      # users in the UI (/users). CHANGE THESE before first run.
      APP_USERNAME: admin
      APP_PASSWORD: admin
      APP_COOKIE_SECURE: "0"    # set to 1 when served over HTTPS (see docker-compose.tls.yml)
      # APP_SECRET: <set to persist login tokens across restarts; random per-process if unset>
      # APP_LOGIN_MAX_FAILS: 5  # lockout threshold per IP
      # APP_LOGIN_LOCK_SECONDS: 900
    volumes:
      # Docker socket ONLY here (control plane). Never in runner containers.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
