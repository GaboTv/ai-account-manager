# TLS overlay. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml --profile tls up --build
# Adds a Caddy HTTPS proxy on :8443, rebuilds the frontend to talk to the API
# at the same origin (/api), and marks the auth cookie Secure.

services:
  backend:
    environment:
      APP_COOKIE_SECURE: "1"   # cookie only sent over HTTPS

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: https://localhost:8443/api

  proxy:
    image: caddy:2
    profiles: ["tls"]
    depends_on: [frontend, backend]
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data

volumes:
  caddy-data:
